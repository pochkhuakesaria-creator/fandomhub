<!DOCTYPE html>
<html lang="en">

<head>

    <title>
        {% block title %}Fandom Hub{% endblock %}
    </title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<nav>

    <a href="{{ url_for('main.home') }}">
        Home
    </a>


    {% if current_user.is_authenticated %}

        <a href="{{ url_for('main.profile') }}">
            View Profile
        </a>


        <a href="{{ url_for('main.logout') }}">
            Logout
        </a>


    {% else %}

        <a href="{{ url_for('main.login') }}">
            Login
        </a>


        <a href="{{ url_for('main.register') }}">
            Register
        </a>

    {% endif %}


</nav>


<hr>


{% block content %}

{% endblock %}

<!-- FOOTER -->

<footer class="site-footer">

    <a href="https://www.tbceducation.ge/" target="_blank">

        <img
        src="{{ url_for('static', filename='images/tbc-logo (1).png') }}"
        alt="TBC Logo">

    </a>

</footer>
</body>

</html>
