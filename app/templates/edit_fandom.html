<!DOCTYPE html>
<html lang="en">

<head>
    <title>Edit Fandom</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/">← Back to Home</a>

<h1>Edit Fandom</h1>

<form method="POST">

    <label>Title</label><br>
    <input type="text" name="title" value="{{ fandom.title }}">

    <br><br>

    <label>Category</label><br>
    <input type="text" name="category" value="{{ fandom.category }}">

    <br><br>

    <label>Description</label><br>
    <textarea name="description">{{ fandom.description }}</textarea>

    <br><br>

    <label>Image URL</label><br>
    <input type="text" name="image" value="{{ fandom.image }}">

    <br><br>

    <button type="submit">Update Fandom</button>

</form>

</body>
</html>
